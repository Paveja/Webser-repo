revolte:
  version: '1.0'
  project: Star
  appName: Knight
  config:
    codeReview:
      summarize: true
      suggestFixes: true
      commentStyle: Balanced
  env:
    staging:
      branch: main
      codeReview: false
      codeQuality: false
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: index.js
          properties:
            health: /health
            port: 8080
            variables:
              BASE_URL: /api/v1
              ACCESS_KEY_ID: '#{storage_bucket_service.accessKeyId}'
              SECRET_ACCESS_KEY_ID: '#{storage_bucket_service.secretAccessKeyId}'
              REGION: '#{storage_bucket_service.region}'
          specifications:
            cpu: 2
            memory: 1
            storage: 30
        rid_2:
          type: STORAGE_BUCKET
          name: storage_bucket_service
          configurations:
            bucketName: revolte-ramco-blue-1-staging
            versioningStatus: enabled
            public: true
    qa:
      branch: main
      codeReview: false
      codeQuality: false
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: app.js
          properties:
            health: /health
            port: 8080
            variables:
              BASE_URL: /api/v1
              ACCESS_KEY_ID: '#{storage_bucket_service.accessKeyId}'
              SECRET_ACCESS_KEY_ID: '#{storage_bucket_service.secretAccessKeyId}'
              REGION: '#{storage_bucket_service.region}'
          specifications:
            cpu: 2
            memory: 2
            storage: 30
        rid_2:
          type: STORAGE_BUCKET
          name: storage_bucket_service
          configurations:
            bucketName: revolte-ramco-blue-1-qa
            versioningStatus: enabled
            public: true
    production:
      branch: dev
      codeReview: false
      codeQuality: false
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: index.js
          properties:
            health: /health
            port: 8080
            variables:
              BASE_URL: /api/v1
              ACCESS_KEY_ID: '#{storage_bucket_service.accessKeyId}'
              SECRET_ACCESS_KEY_ID: '#{storage_bucket_service.secretAccessKeyId}'
              REGION: '#{storage_bucket_service.region}'
              BUCKET_NAME: 'revolte-ramco-blue-2-production'
          specifications:
            cpu: 2
            memory: 1
            storage: 30
            autoScaling:
              replica:
                min: 1
                max: 1
        rid_2:
          type: STORAGE_BUCKET
          name: storage_bucket_service
          configurations:
            bucketName: revolte-ramco-blue-1-production
            versioningStatus: enabled
            public: true
        rid_3:
          type: STORAGE_BUCKET
          name: storage_bucket_service2
          configurations:
            bucketName: revolte-ramco-blue-2-production
            versioningStatus: suspended
            public: false