revolte:
  version: "1.0"
  project: Strike
  appName: Knight
  env:
    preview:
      branch: main
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: app.js
          apiEntryPoint: Gateway
          route:
            path: /api-service
            stripBasePath: false
          properties:
            health: /api-service/health
            port: 8080
            variables:
              BASE_URL: /api/v1
          specifications:
            cpu: 2
            memory: 2
            storage: 30
    qa:
      branch: main
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: app.js
          apiEntryPoint: Gateway
          route:
            path: /api-service
            stripBasePath: false
          properties:
            health: /health
            port: 8080
            variables:
              BASE_URL: /api/v1
          specifications:
            cpu: 2
            memory: 2
            storage: 30
    staging:
      branch: main
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: app.js
          apiEntryPoint: Gateway
          route:
            path: /api-service
            stripBasePath: false
          properties:
            health: /api-service/health
            port: 8080
            variables:
              BASE_URL: /api/v1
          specifications:
            cpu: 2
            memory: 2
            storage: 30
